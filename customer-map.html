<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where My Customers Come From — Pablo's Cars</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header id="site-header" class="nav"></header>

<section class="section" style="padding-top:28px;">
  <div class="container">
    <div class="label" style="margin-bottom:10px; color:var(--orange-bright);">Customer map</div>
    <h1>Where My Customers Come From</h1>
    <p class="lede">City-level locations only — never exact customer addresses.</p>
  </div>
</section>

<section class="section" style="padding-top:0;">
  <div class="container">
    <div id="customerMap" class="customer-map"></div>
    <div id="customerMapEmpty" class="empty-state" style="display:none;">No customer locations added yet — check back soon.</div>
  </div>
</section>

<footer id="site-footer" class="footer"></footer>

<script src="js/data-loader.js"></script>
<script src="js/layout.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="js/customer-map.js"></script>
<script>
  loadSiteData().then(() => {
    renderHeader();
    renderFooter();
    renderCustomerMap();
  });
</script>
</body>
</html>
