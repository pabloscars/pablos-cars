backend:
  name: git-gateway
  branch: main

# Where uploaded photos land, and the path used to reference them on the site.
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "cars"
    label: "Cars"
    folder: "data/cars"
    create: true
    extension: "json"
    format: "json"
    slug: "{{fields.id}}"
    identifier_field: "id"
    summary: "{{fields.year}} {{fields.make}} {{fields.model}} — {{fields.status}}"
    sortable_fields: ["status", "dateAdded", "sortOrder", "year"]
    fields:
      - { label: "Unique ID (no spaces, e.g. 2016-civic-02)", name: "id", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["available", "sold"] }
      - { label: "Display Order (a running count — 1 is your oldest car, each new one gets the next number up; higher numbers show first; leave blank to just sort by date)", name: "sortOrder", widget: "number", value_type: "int", required: false }
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - { label: "Make", name: "make", widget: "string" }
      - { label: "Model", name: "model", widget: "string" }
      - { label: "Trim", name: "trim", widget: "string", required: false }
      - { label: "Body Type", name: "bodyType", widget: "select", options: ["sedan", "suv", "truck", "coupe", "van", "other"] }
      - { label: "Price (USD)", name: "price", widget: "number", value_type: "int" }
      - { label: "Mileage", name: "mileage", widget: "number", value_type: "int" }
      - { label: "VIN", name: "vin", widget: "string", required: false }
      - { label: "Show VIN Publicly On Listing", name: "showVin", widget: "boolean", default: false, required: false }
      - { label: "Location", name: "location", widget: "string", default: "Asheville, NC" }
      - { label: "Title Status", name: "titleStatus", widget: "select", options: ["Salvage Title", "Rebuilt Title"] }
      - { label: "No Airbags Deployed", name: "noAirbagsDeployed", widget: "boolean", default: false, required: false, hint: "Shows as a trust badge on the listing" }
      - { label: "No Frame Damage", name: "noFrameDamage", widget: "boolean", default: false, required: false, hint: "Shows as a trust badge on the listing" }
      - { label: "No Glass Broken", name: "noGlassBroken", widget: "boolean", default: false, required: false, hint: "Shows as a trust badge on the listing" }
      - { label: "No Warning Lights", name: "noWarningLights", widget: "boolean", default: false, required: false, hint: "Shows as a trust badge on the listing" }
      - { label: "Keys", name: "keyCount", widget: "select", options: ["1 Key", "2 Keys"], required: false }
      - label: "Badges"
        name: "tags"
        widget: "list"
        field: { label: "Badge", name: "tag", widget: "string" }
      - { label: "Engine", name: "engine", widget: "string", required: false }
      - { label: "Transmission", name: "transmission", widget: "string", required: false }
      - { label: "Drivetrain", name: "drivetrain", widget: "select", options: ["FWD", "RWD", "AWD", "4x4"], required: false }
      - { label: "Fuel Type", name: "fuelType", widget: "select", options: ["Gasoline", "Diesel", "Hybrid", "Electric", "Flex Fuel"], required: false }
      - { label: "Exterior Color", name: "exteriorColor", widget: "string", required: false }
      - { label: "Interior Color", name: "interiorColor", widget: "string", required: false }
      - { label: "Interior Material", name: "interiorMaterial", widget: "string", required: false }
      - { label: "Fuel Economy (e.g. 32 city / 40 hwy)", name: "mpg", widget: "string", required: false }
      - { label: "Known Issues", name: "knownIssues", widget: "text", required: false }
      - { label: "What Was Repaired", name: "whatWasRepaired", widget: "text", required: false }
      - { label: "Why This Title Status", name: "whySalvage", widget: "text", required: false }
      - label: "Comfort & Convenience"
        name: "comfortFeatures"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Remote Start", name: "remoteStart", widget: "boolean", default: false, required: false }
          - { label: "Push Button Start", name: "pushButtonStart", widget: "boolean", default: false, required: false }
          - { label: "Keyless Entry", name: "keylessEntry", widget: "boolean", default: false, required: false }
          - { label: "Heated Seats", name: "heatedSeats", widget: "boolean", default: false, required: false }
          - { label: "Ventilated Seats", name: "ventilatedSeats", widget: "boolean", default: false, required: false }
          - { label: "Power Seats", name: "powerSeats", widget: "boolean", default: false, required: false }
          - { label: "Memory Seats", name: "memorySeats", widget: "boolean", default: false, required: false }
          - { label: "Heated Rear Seats", name: "heatedRearSeats", widget: "boolean", default: false, required: false }
          - { label: "Third Row Seating", name: "thirdRowSeating", widget: "boolean", default: false, required: false }
          - { label: "Folding Rear Seats", name: "foldingRearSeats", widget: "boolean", default: false, required: false }
          - { label: "Split Folding Rear Seats", name: "splitFoldingRearSeats", widget: "boolean", default: false, required: false }
          - { label: "Flat Folding Seats", name: "flatFoldingSeats", widget: "boolean", default: false, required: false }
          - { label: "Adjustable Lumbar Support", name: "adjustableLumbarSupport", widget: "boolean", default: false, required: false }
          - { label: "Heated Steering Wheel", name: "heatedSteeringWheel", widget: "boolean", default: false, required: false }
          - { label: "Dual Climate Control", name: "dualClimateControl", widget: "boolean", default: false, required: false }
          - { label: "Rear A/C Vents", name: "rearACVents", widget: "boolean", default: false, required: false }
          - { label: "Wireless Phone Charger", name: "wirelessPhoneCharger", widget: "boolean", default: false, required: false }
          - { label: "Auto-Dimming Mirrors", name: "autoDimmingMirrors", widget: "boolean", default: false, required: false }
          - { label: "Rain-Sensing Wipers", name: "rainSensingWipers", widget: "boolean", default: false, required: false }
          - { label: "Power Liftgate", name: "powerLiftgate", widget: "boolean", default: false, required: false }
          - { label: "Hands-Free Liftgate", name: "handsFreeLiftgate", widget: "boolean", default: false, required: false }
          - { label: "Remote Trunk Release", name: "remoteTrunkRelease", widget: "boolean", default: false, required: false }
          - { label: "Garage Door Opener", name: "garageDoorOpener", widget: "boolean", default: false, required: false }
          - { label: "Ambient Lighting", name: "ambientLighting", widget: "boolean", default: false, required: false }
          - { label: "Rear Sunshade", name: "rearSunshade", widget: "boolean", default: false, required: false }
          - { label: "Panoramic Sunroof", name: "panoramicSunroof", widget: "boolean", default: false, required: false }
          - { label: "Sunroof / Moonroof", name: "sunroofMoonroof", widget: "boolean", default: false, required: false }
          - { label: "Large Cargo Space", name: "largeCargoSpace", widget: "boolean", default: false, required: false }
          - { label: "Rear Entertainment", name: "rearEntertainment", widget: "boolean", default: false, required: false }
      - label: "Tech"
        name: "techFeatures"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Apple CarPlay", name: "appleCarPlay", widget: "boolean", default: false, required: false }
          - { label: "Android Auto", name: "androidAuto", widget: "boolean", default: false, required: false }
          - { label: "Bluetooth", name: "bluetooth", widget: "boolean", default: false, required: false }
          - { label: "Navigation", name: "navigation", widget: "boolean", default: false, required: false }
          - { label: "Backup Camera", name: "backupCamera", widget: "boolean", default: false, required: false }
          - { label: "360 Camera", name: "camera360", widget: "boolean", default: false, required: false }
          - { label: "Front Parking Sensors", name: "frontParkingSensors", widget: "boolean", default: false, required: false }
          - { label: "Rear Parking Sensors", name: "rearParkingSensors", widget: "boolean", default: false, required: false }
          - { label: "Heads-Up Display", name: "headsUpDisplay", widget: "boolean", default: false, required: false }
          - { label: "Digital Gauge Cluster", name: "digitalGaugeCluster", widget: "boolean", default: false, required: false }
          - { label: "Premium Sound System", name: "premiumSoundSystem", widget: "boolean", default: false, required: false }
          - { label: "Bose Audio", name: "boseAudio", widget: "boolean", default: false, required: false }
          - { label: "Harman Kardon Audio", name: "harmanKardonAudio", widget: "boolean", default: false, required: false }
          - { label: "Touchscreen Radio", name: "touchscreenRadio", widget: "boolean", default: false, required: false }
          - { label: "USB-C Ports", name: "usbCPorts", widget: "boolean", default: false, required: false }
          - { label: "Rear USB Ports", name: "rearUsbPorts", widget: "boolean", default: false, required: false }
          - { label: "WiFi Hotspot", name: "wifiHotspot", widget: "boolean", default: false, required: false }
          - { label: "Satellite Radio", name: "satelliteRadio", widget: "boolean", default: false, required: false }
          - { label: "Wireless CarPlay", name: "wirelessCarPlay", widget: "boolean", default: false, required: false }
      - label: "Driver Assist & Safety"
        name: "driverAssistFeatures"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Blind Spot Monitoring", name: "blindSpotMonitoring", widget: "boolean", default: false, required: false }
          - { label: "Lane Keep Assist", name: "laneKeepAssist", widget: "boolean", default: false, required: false }
          - { label: "Lane Departure Warning", name: "laneDepartureWarning", widget: "boolean", default: false, required: false }
          - { label: "Adaptive Cruise Control", name: "adaptiveCruiseControl", widget: "boolean", default: false, required: false }
          - { label: "Forward Collision Alert", name: "forwardCollisionAlert", widget: "boolean", default: false, required: false }
          - { label: "Automatic Emergency Braking", name: "automaticEmergencyBraking", widget: "boolean", default: false, required: false }
          - { label: "Rear Cross Traffic Alert", name: "rearCrossTrafficAlert", widget: "boolean", default: false, required: false }
          - { label: "Parking Assist", name: "parkingAssist", widget: "boolean", default: false, required: false }
          - { label: "Collision Avoidance", name: "collisionAvoidance", widget: "boolean", default: false, required: false }
          - { label: "Pedestrian Detection", name: "pedestrianDetection", widget: "boolean", default: false, required: false }
          - { label: "Traffic Sign Recognition", name: "trafficSignRecognition", widget: "boolean", default: false, required: false }
          - { label: "Automatic High Beams", name: "automaticHighBeams", widget: "boolean", default: false, required: false }
          - { label: "Tire Pressure Monitoring", name: "tirePressureMonitoring", widget: "boolean", default: false, required: false }
          - { label: "Stability Control", name: "stabilityControl", widget: "boolean", default: false, required: false }
          - { label: "ABS Brakes", name: "absBrakes", widget: "boolean", default: false, required: false }
      - label: "Performance & Driving"
        name: "performanceFeatures"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Sport Mode", name: "sportMode", widget: "boolean", default: false, required: false }
          - { label: "Paddle Shifters", name: "paddleShifters", widget: "boolean", default: false, required: false }
          - { label: "Turbocharged", name: "turbocharged", widget: "boolean", default: false, required: false }
          - { label: "Supercharged", name: "supercharged", widget: "boolean", default: false, required: false }
          - { label: "Brembo Brakes", name: "bremboBrakes", widget: "boolean", default: false, required: false }
          - { label: "Performance Exhaust", name: "performanceExhaust", widget: "boolean", default: false, required: false }
          - { label: "Air Suspension", name: "airSuspension", widget: "boolean", default: false, required: false }
          - { label: "Tow Package", name: "towPackage", widget: "boolean", default: false, required: false }
          - { label: "Limited Slip Differential", name: "limitedSlipDifferential", widget: "boolean", default: false, required: false }
          - { label: "Off-Road Package", name: "offRoadPackage", widget: "boolean", default: false, required: false }
          - { label: "Drive Modes", name: "driveModes", widget: "boolean", default: false, required: false }
          - { label: "Launch Control", name: "launchControl", widget: "boolean", default: false, required: false }
      - label: "Exterior"
        name: "exteriorFeatures"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "LED Headlights", name: "ledHeadlights", widget: "boolean", default: false, required: false }
          - { label: "HID Headlights", name: "hidHeadlights", widget: "boolean", default: false, required: false }
          - { label: "Fog Lights", name: "fogLights", widget: "boolean", default: false, required: false }
          - { label: "Daytime Running Lights", name: "daytimeRunningLights", widget: "boolean", default: false, required: false }
          - { label: "Tinted Windows", name: "tintedWindows", widget: "boolean", default: false, required: false }
          - { label: "Roof Rails", name: "roofRails", widget: "boolean", default: false, required: false }
          - { label: "Running Boards", name: "runningBoards", widget: "boolean", default: false, required: false }
          - { label: "Bed Liner", name: "bedLiner", widget: "boolean", default: false, required: false }
          - { label: "Tow Hitch", name: "towHitch", widget: "boolean", default: false, required: false }
          - { label: "Heated Mirrors", name: "heatedMirrors", widget: "boolean", default: false, required: false }
          - { label: "Power Folding Mirrors", name: "powerFoldingMirrors", widget: "boolean", default: false, required: false }
          - { label: "Privacy Glass", name: "privacyGlass", widget: "boolean", default: false, required: false }
      - label: "Salvage / Rebuild Specific"
        name: "salvageFeatures"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Theft Recovery", name: "theftRecovery", widget: "boolean", default: false, required: false }
          - { label: "Cosmetic Damage", name: "cosmeticDamage", widget: "boolean", default: false, required: false }
          - { label: "Hail Damage", name: "hailDamage", widget: "boolean", default: false, required: false }
          - { label: "Side Swipe Damage", name: "sideSwipeDamage", widget: "boolean", default: false, required: false }
          - { label: "Front End Damage", name: "frontEndDamage", widget: "boolean", default: false, required: false }
          - { label: "Rear End Damage", name: "rearEndDamage", widget: "boolean", default: false, required: false }
          - { label: "Minor Collision", name: "minorCollision", widget: "boolean", default: false, required: false }
          - { label: "Rebuilt Title", name: "rebuiltTitle", widget: "boolean", default: false, required: false }
          - { label: "Salvage History", name: "salvageHistory", widget: "boolean", default: false, required: false }
      - label: "Repairs Completed"
        name: "repairsCompleted"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - { label: "Oil Change", name: "oilChange", widget: "boolean", default: false, required: false }
          - { label: "New Battery", name: "newBattery", widget: "boolean", default: false, required: false }
          - { label: "New Tires", name: "newTires", widget: "boolean", default: false, required: false }
          - { label: "Alignment", name: "alignment", widget: "boolean", default: false, required: false }
          - { label: "NC State Inspection", name: "ncStateInspected", widget: "boolean", default: false, required: false }
          - { label: "State Rebuilt Inspection Passed", name: "stateRebuiltInspectionPassed", widget: "boolean", default: false, required: false }
          - { label: "Structural Damage Repaired", name: "structuralDamageRepaired", widget: "boolean", default: false, required: false }
          - { label: "Airbags Replaced", name: "airbagsReplaced", widget: "boolean", default: false, required: false }
          - { label: "Professionally Repaired", name: "professionallyRepaired", widget: "boolean", default: false, required: false }
          - { label: "Cabin Air Filter", name: "cabinAirFilter", widget: "boolean", default: false, required: false }
          - { label: "Engine Air Filter", name: "engineAirFilter", widget: "boolean", default: false, required: false }
          - { label: "Front Wipers", name: "frontWipers", widget: "boolean", default: false, required: false }
          - { label: "Rear Wiper", name: "rearWiper", widget: "boolean", default: false, required: false }
          - { label: "Spark Plugs", name: "sparkPlugs", widget: "boolean", default: false, required: false }
          - { label: "Front Rotors & Pads", name: "frontRotorsPads", widget: "boolean", default: false, required: false }
          - { label: "Rear Rotors & Pads", name: "rearRotorsPads", widget: "boolean", default: false, required: false }
          - { label: "Wheel Balance", name: "wheelBalance", widget: "boolean", default: false, required: false }
          - { label: "TPMS Sensors", name: "tpmsSensors", widget: "boolean", default: false, required: false }
          - { label: "Valve Cover Gasket", name: "valveCoverGasket", widget: "boolean", default: false, required: false }
          - { label: "Serpentine Belt", name: "serpentineBelt", widget: "boolean", default: false, required: false }
          - { label: "Coolant Flush", name: "coolantFlush", widget: "boolean", default: false, required: false }
          - { label: "Brake Fluid Flush", name: "brakeFluidFlush", widget: "boolean", default: false, required: false }
          - { label: "Fuel Filter", name: "fuelFilter", widget: "boolean", default: false, required: false }
      - label: "Other Highlights"
        name: "highlights"
        widget: "list"
        required: false
        field: { label: "Highlight", name: "item", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Cover Photo (main photo — shown on the homepage card, this admin list, and first in the gallery)", name: "image", widget: "image", required: false }
      - label: "Additional Photos (add one at a time — see note below on speeding this up)"
        name: "photos"
        widget: "list"
        required: false
        collapsed: true
        summary: "{{fields.photo}}"
        field: { label: "Photo", name: "photo", widget: "image" }
      - label: "Photo Sections"
        name: "photoSections"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "Auction Photos (from the original auction listing — add one at a time)"
            name: "auctionPhotos"
            widget: "list"
            required: false
            collapsed: true
            summary: "{{fields.photo}}"
            field: { label: "Photo", name: "photo", widget: "image" }
          - label: "Deep Cleaning (max 3 photos)"
            name: "deepCleaning"
            widget: "list"
            required: false
            max: 3
            collapsed: true
            summary: "{{fields.photo}}"
            field: { label: "Photo", name: "photo", widget: "image" }
      - { label: "Video URL (YouTube/Facebook link, or leave blank)", name: "videoUrl", widget: "string", required: false }
      - { label: "Facebook Listing Link (optional, leave blank to use your profile)", name: "facebookUrl", widget: "string", required: false }
      - { label: "Date Added", name: "dateAdded", widget: "datetime", format: "YYYY-MM-DD", required: false }
      - { label: "Date Sold (only if sold)", name: "dateSold", widget: "datetime", format: "YYYY-MM-DD", required: false }

  - name: "business"
    label: "Business Info"
    files:
      - file: "data/business.json"
        label: "Business Info"
        name: "business"
        fields:
          - { label: "Business Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Owner Name", name: "ownerName", widget: "string" }
          - { label: "Facebook Profile URL", name: "facebookUrl", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Appointment Note", name: "appointmentNote", widget: "string" }
          - { label: "Bio", name: "bio", widget: "text" }
          - { label: "Policy Note (no holds, no trades, etc.)", name: "policyNote", widget: "text" }

  - name: "customerMap"
    label: "Customer Map"
    files:
      - file: "data/customer-locations.json"
        label: "Customer Locations"
        name: "customerLocations"
        fields:
          - label: "Locations (city-level only — never a customer's name or exact address). Add one entry per purchase — repeat the same city as many times as you have customers from there."
            name: "locations"
            widget: "list"
            summary: "{{fields.city}}, {{fields.state}}"
            fields:
              - { label: "City", name: "city", widget: "string" }
              - { label: "State (2-letter abbreviation, e.g. TN)", name: "state", widget: "string" }
