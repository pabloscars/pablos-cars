<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pablo's Cars — Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    /* Decap CMS renders its own boolean toggle field ("Remote Start",
       "Heated Seats", etc.) inside a full-width bordered box, leaving
       a lot of empty space next to the small switch. Shrink that box
       to fit just the toggle instead. Scoped to containers that hold
       a Toggle-labeled element so no other field type is affected. */
    [class*="ControlContainer"]:has([class*="ToggleContainer"]) {
      display: inline-block;
      width: auto;
      min-width: 0;
      padding: 10px 14px;
    }
    /* The whole field (label text + toggle box) is wrapped in one
       outer <label>, with the label text and control box as sibling
       divs inside it — shrink the whole label to a compact column
       instead of letting it stretch full width. */
    label:has([class*="ToggleContainer"]) {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      width: auto;
    }
    /* The feature-category objects (Comfort & Convenience, Tech, etc.)
       hold 8-25 toggles each, stacked one per line by default — that's
       most of the "scroll forever" problem. Wrap their direct container
       into a flowing grid instead so a category fits in a few rows.
       Note: :has() cannot contain another :has() per spec, so this has
       to be written as a single :has() with a plain descendant selector
       inside it rather than nesting — a bare ":has(> label:has(...))"
       silently matches nothing in any browser. */
    :has(> label [class*="ToggleContainer"]) {
      display: flex !important;
      flex-flow: row wrap;
      gap: 2px 14px;
    }
    /* Plain text/number/select/date fields (Year, Make, Model, Trim,
       Body Type, VIN, ...) each got their own full-width row with room
       to spare — the same "one bubble per line" problem as the toggles,
       just for short fields like "2018" or "Cadillac".

       The earlier attempt here targeted "label:has(input)", assuming
       every field's label wraps its control the way the boolean toggle
       does. It doesn't — per Decap's own source (EditorControl.js),
       every field's outer wrapper is ControlContainer > (ControlTopbar
       containing the <label>, plus the actual widget as a SIBLING, not
       a child, linked only by label[for]/input[id]). That's also why
       label:has(input) silently matched nothing.

       What IS reliable, straight from that same source: ControlContainer
       always carries aria-label="{widget-type} field" (e.g. "string
       field", "select field") — driven by the widget name in this
       config, not by guessed DOM nesting or hashed class names. */
    [aria-label="string field"],
    [aria-label="number field"],
    [aria-label="select field"],
    [aria-label="datetime field"] {
      display: inline-block;
      width: auto;
      min-width: 190px;
      max-width: 320px;
      vertical-align: top;
    }
    :has(> [aria-label="string field"]),
    :has(> [aria-label="number field"]),
    :has(> [aria-label="select field"]),
    :has(> [aria-label="datetime field"]) {
      display: flex !important;
      flex-flow: row wrap;
      align-items: flex-end;
      gap: 4px 16px;
    }
    /* That flex-wrap parent holds EVERY top-level field, not just the
       compact ones — Description, Known Issues, the feature-category
       objects, the cover photo, and the photo lists are direct siblings
       of Year/Make/Model in the same container. Without an explicit
       width they became flex items with no sizing to go on and got
       squeezed to arbitrary widths, scattering the form. Force these
       wide field types to always claim a full row for themselves —
       flex-basis:100% inside a wrapping flex row pushes everything
       after it onto a fresh line, same effect as them being block-level
       again, just resilient to sitting inside the flex parent above. */
    [aria-label="text field"],
    [aria-label="list field"],
    [aria-label="object field"],
    [aria-label="image field"] {
      flex: 1 0 100%;
      width: 100%;
    }
    /* Collapsed rows in an image list (Additional Photos, Auction
       Photos, Deep Cleaning) just show the raw file path as text —
       shown as a background thumbnail by the script below instead.
       This only sets style/class attributes, never touches child
       nodes (see the script's comment for why that distinction
       matters), so React's own ownership of this element's children
       is undisturbed. */
    .admin-photo-thumb-bg {
      color: transparent !important;
      min-height: 64px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <!-- This loads the Decap CMS admin dashboard. Log in with your
       Netlify Identity account (see README.md for one-time setup)
       to add, edit, or remove listings and upload photos. -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.reload();
          });
        }
      });
    }
  </script>
  <script>
    /* ============================================================
       LIVE CAR LISTING PREVIEW
       Replaces Decap's default "dump every field as plain text"
       preview with something that actually looks like the listing
       you're about to publish — same fonts/colors as the real site
       (loaded via registerPreviewStyle below), updating as you type.
       ============================================================ */
    var REPAIRS_COMPLETED_ITEMS = [
      ["oilChange", "Oil Change"],
      ["newBattery", "New Battery"],
      ["newTires", "New Tires"],
      ["alignment", "Alignment"],
      ["ncStateInspected", "NC State Inspection"],
      ["cabinAirFilter", "Cabin Air Filter"],
      ["engineAirFilter", "Engine Air Filter"],
      ["frontWipers", "Front Wipers"],
      ["rearWiper", "Rear Wiper"],
      ["sparkPlugs", "Spark Plugs"],
      ["frontRotorsPads", "Front Rotors & Pads"],
      ["rearRotorsPads", "Rear Rotors & Pads"],
      ["wheelBalance", "Wheel Balance"],
      ["tpmsSensors", "TPMS Sensors"],
      ["valveCoverGasket", "Valve Cover Gasket"],
      ["serpentineBelt", "Serpentine Belt"],
      ["coolantFlush", "Coolant Flush"],
      ["brakeFluidFlush", "Brake Fluid Flush"],
      ["fuelFilter", "Fuel Filter"]
    ];

    var TRUST_BADGES = [
      ["noAirbagsDeployed", "No Airbags Deployed", '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5"/><path d="M12 9.5V4M9 13.5l-4.3 2.5M15 13.5l4.3 2.5"/></svg>'],
      ["noFrameDamage", "No Frame Damage", '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 15.5 L2 12.7 Q2 11.7 3 11.4 L5.7 10.6 L8.3 7.7 Q8.9 7.2 9.7 7.2 L14.5 7.2 Q15.3 7.2 15.9 7.7 L18.5 10.6 L20.8 11.2 Q21.8 11.5 21.8 12.5 L21.8 15.5"/><path d="M2 15.5L6 15.5"/><path d="M9 15.5L15 15.5"/><path d="M18 15.5L21.8 15.5"/><circle cx="7.5" cy="16.3" r="2"/><circle cx="16.5" cy="16.3" r="2"/></svg>'],
      ["noGlassBroken", "No Glass Broken", '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 17L8 6.5H17L20.5 17Z"/><path d="M10 15L14 9" stroke-width="1.3" opacity="0.6"/></svg>'],
      ["noWarningLights", "No Warning Lights", '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l10 18H2L12 3z"/><path d="M12 10v4"/><circle cx="12" cy="17" r="0.6" fill="currentColor" stroke="none"/></svg>']
    ];

    var CarPreview = createClass({
      render: function () {
        var entry = this.props.entry;
        var getAsset = this.props.getAsset;

        function field(name) {
          var v = entry.getIn(["data", name]);
          return v === undefined || v === null ? "" : v;
        }

        var year = field("year");
        var make = field("make");
        var model = field("model");
        var trim = field("trim");
        var title = [year, make, model, trim].filter(Boolean).join(" ");
        var status = field("status") || "available";
        var titleStatus = field("titleStatus");
        var price = field("price");
        var mileage = field("mileage");

        var coverImagePath = entry.getIn(["data", "image"]);
        var coverImageUrl = coverImagePath ? getAsset(coverImagePath).toString() : null;

        var tagsList = entry.getIn(["data", "tags"]);
        var tags = tagsList
          ? tagsList.toJS().map(function (t) { return t && t.tag; }).filter(Boolean)
          : [];

        var badges = TRUST_BADGES.filter(function (b) {
          return entry.getIn(["data", b[0]]) === true;
        });

        var specRows = [
          ["Mileage", mileage ? Number(mileage).toLocaleString() + " mi" : ""],
          ["Engine", field("engine")],
          ["Transmission", field("transmission")],
          ["Drivetrain", field("drivetrain")],
          ["Keys", field("keyCount")],
          ["Fuel Type", field("fuelType")],
          ["Exterior", field("exteriorColor")],
          ["Interior", field("interiorColor")],
          ["MPG", field("mpg")]
        ].filter(function (s) { return s[1]; });

        var description = field("description");
        var knownIssues = field("knownIssues");
        var whatWasRepaired = field("whatWasRepaired");
        var whySalvage = field("whySalvage");
        var videoUrl = field("videoUrl");

        function customItemLabels(path) {
          var list = entry.getIn(["data"].concat(path).concat(["other"]));
          return list
            ? list.toJS().map(function (o) { return o && o.item; }).filter(Boolean)
            : [];
        }

        var repairsCompletedLabels = REPAIRS_COMPLETED_ITEMS
          .filter(function (r) { return entry.getIn(["data", "repairsCompleted", r[0]]) === true; })
          .map(function (r) { return r[1]; })
          .concat(customItemLabels(["repairsCompleted"]));
        var repairedNotes = (whatWasRepaired || "")
          .split("\n")
          .map(function (line) { return line.replace(/^[\s.\-•]+/, "").trim(); })
          .filter(Boolean);
        var repairedItems = repairsCompletedLabels.concat(repairedNotes);

        var highlightsList = entry.getIn(["data", "highlights"]);
        var highlights = highlightsList
          ? highlightsList.toJS().map(function (item) { return item && item.item; }).filter(Boolean)
          : [];

        function photoGroup(path) {
          var list = entry.getIn(["data"].concat(path));
          return list
            ? list.toJS()
                .map(function (p) { return p && p.photo ? getAsset(p.photo).toString() : null; })
                .filter(Boolean)
            : [];
        }

        var photoUrls = photoGroup(["photos"]);
        var auctionPhotoUrls = photoGroup(["photoSections", "auctionPhotos"]);
        var deepCleaningUrls = photoGroup(["photoSections", "deepCleaning"]);

        function photoGrid(label, urls) {
          return urls.length
            ? h("div", { key: label }, [
                h("h3", { key: "h", style: { marginTop: "22px" } }, label),
                h(
                  "div",
                  { className: "admin-car-preview__grid", key: "grid" },
                  urls.map(function (url, i) {
                    return h("img", { src: url, key: i, className: "admin-car-preview__thumb" });
                  })
                )
              ])
            : null;
        }

        return h(
          "div",
          { className: "admin-car-preview" },
          h(
            "div",
            { className: "container" },
            h(
              "div",
              { className: "label", style: { color: "var(--orange-bright)", marginBottom: "8px" } },
              (status === "sold" ? "SOLD" : "AVAILABLE") + (titleStatus ? " · " + titleStatus : "")
            ),
            h("h1", {}, title || "New vehicle"),
            coverImageUrl
              ? h("img", { src: coverImageUrl, className: "admin-car-preview__cover" })
              : h("div", { className: "admin-car-preview__cover admin-car-preview__cover--empty" }, "No cover photo yet"),
            h(
              "div",
              { className: "vdp-sidebar", style: { margin: "20px 0" } },
              h("div", { className: "vdp-price" }, price ? "$" + Number(price).toLocaleString() : "Price TBD"),
              h(
                "div",
                { className: "vdp-specs" },
                specRows.map(function (s, i) {
                  return h("div", { key: i }, [
                    h("dt", { key: "dt" }, s[0]),
                    h("dd", { key: "dd" }, s[1])
                  ]);
                })
              ),
              badges.length
                ? h(
                    "div",
                    { className: "trust-badges" },
                    badges.map(function (b, i) {
                      return h("div", { className: "trust-badge", key: i }, [
                        h("div", { className: "trust-badge__icon", key: "icon", dangerouslySetInnerHTML: { __html: b[2] } }),
                        h("div", { className: "trust-badge__label", key: "label" }, b[1])
                      ]);
                    })
                  )
                : null
            ),
            tags.length
              ? h(
                  "div",
                  { className: "chip-row", style: { marginBottom: "16px" } },
                  tags.map(function (t, i) { return h("span", { className: "chip", key: i }, t); })
                )
              : null,
            description ? h("p", { key: "desc" }, description) : null,
            highlights.length
              ? h(
                  "ul",
                  { className: "highlights-list", key: "highlights" },
                  highlights.map(function (item, i) { return h("li", { key: i }, item); })
                )
              : null,
            knownIssues ? h("p", { key: "known" }, [h("strong", { key: "s" }, "Known Issues: "), knownIssues]) : null,
            repairedItems.length
              ? h("div", { className: "feature-card feature-card--wide", key: "repaired", style: { margin: "16px 0" } }, [
                  h("h3", { key: "h" }, "What Was Repaired"),
                  h(
                    "ul",
                    { className: "highlights-list highlights-list--repaired", key: "ul" },
                    repairedItems.map(function (item, i) { return h("li", { key: i }, item); })
                  )
                ])
              : null,
            whySalvage ? h("p", { key: "why" }, [h("strong", { key: "s" }, "Why This Title Status: "), whySalvage]) : null,
            videoUrl ? h("p", { key: "video" }, [h("strong", { key: "s" }, "Video: "), h("a", { key: "a", href: videoUrl, target: "_blank", rel: "noopener" }, videoUrl)]) : null,
            photoGrid("additional photos", photoUrls),
            photoGrid("auction photos", auctionPhotoUrls),
            photoGrid("deep cleaning", deepCleaningUrls)
          )
        );
      }
    });

    CMS.registerPreviewTemplate("cars", CarPreview);

    // The real site stylesheet — same fonts, colors, price/spec/badge
    // styling as the live vehicle page — so the preview isn't just
    // accurate in content, it looks like the actual listing.
    CMS.registerPreviewStyle("/css/style.css");
    CMS.registerPreviewStyle(
      "body{background:var(--bg); margin:0;}" +
      ".admin-car-preview{padding:24px 0 40px;}" +
      ".admin-car-preview__cover{width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:16px; margin:14px 0;}" +
      ".admin-car-preview__cover--empty{display:flex; align-items:center; justify-content:center; aspect-ratio:4/3; background:var(--glass); border:1px dashed var(--glass-border); color:var(--text-faint); font-family:var(--font-m); font-size:0.85rem; border-radius:16px; margin:14px 0;}" +
      ".admin-car-preview__grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:8px; margin-top:18px;}" +
      ".admin-car-preview__thumb{width:100%; aspect-ratio:4/3; object-fit:cover; border-radius:8px;}",
      { raw: true }
    );
  </script>
  <script>
    /* ============================================================
       PHOTO LIST THUMBNAILS
       Collapsed rows in an image list (Additional Photos, Auction
       Photos, Deep Cleaning) show the item's raw file path as plain
       text — Decap's "summary" option is text-only, there's no
       built-in way to render an actual thumbnail there. This finds
       those rows (each is a "NestedObjectLabel" per Decap's own
       ListControl.js source) whose text looks like an image path and
       shows the image as a CSS background instead, keeping the full
       path as a hover tooltip. Runs on a MutationObserver since Decap
       re-renders the form constantly (every keystroke, every collapse
       toggle).

       Deliberately only sets style/class/title/data- attributes here,
       never el.textContent or append/removeChild — Decap owns this
       element's children (it's a live React tree), and manually
       replacing them out from under React works fine right up until
       React itself re-renders that node (e.g. right after Publish,
       when the entry list refreshes) and finds child nodes it didn't
       create. That's what was throwing "Minified React error #130"
       on publish. Attribute changes don't have that problem — React
       just overwrites them on its own next pass. */
    var IMAGE_PATH_RE = /\.(jpe?g|png|gif|webp|avif)$/i;

    function upgradePhotoSummaries() {
      var labels = document.querySelectorAll('[class*="NestedObjectLabel"]');
      labels.forEach(function (el) {
        var text = el.textContent.trim();
        if (el.dataset.thumbSrc === text) return;
        if (!IMAGE_PATH_RE.test(text)) {
          if (el.dataset.thumbSrc) {
            el.style.backgroundImage = "";
            el.classList.remove("admin-photo-thumb-bg");
            el.removeAttribute("title");
            delete el.dataset.thumbSrc;
          }
          return;
        }
        el.dataset.thumbSrc = text;
        el.title = text;
        el.style.backgroundImage = 'url("' + text + '")';
        el.classList.add("admin-photo-thumb-bg");
      });
    }

    var photoThumbTimer = null;
    var photoThumbObserver = new MutationObserver(function () {
      clearTimeout(photoThumbTimer);
      photoThumbTimer = setTimeout(upgradePhotoSummaries, 60);
    });
    photoThumbObserver.observe(document.body, { childList: true, subtree: true });
    upgradePhotoSummaries();
  </script>
</body>
</html>
